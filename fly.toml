# fly.toml app configuration file generated for brawliq on 2026-05-14T14:47:56-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brawliq'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'brawliq_data'
  destination = '/data'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
